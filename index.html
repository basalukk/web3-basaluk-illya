<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота</title>
</head>
<style>
body {
    font-family: Arial;
    padding: 20px;
}

input, textarea {
    width: 300px;
}

button {
    padding: 5px 10px;
}
</style>
<body>

<h2>Список користувачів</h2>
<ul id="usersList"></ul>

<hr>

<h2>Створити пост</h2>

<form id="postForm">
    <input type="text" id="title" placeholder="Заголовок" required><br><br>
    <textarea id="body" placeholder="Текст" required></textarea><br><br>
    <button type="submit">Відправити</button>
</form>

<script>

async function loadUsers() {
    const list = document.getElementById("usersList");

    try {
        const response = await fetch("https://jsonplaceholder.typicode.com/users");

        if (!response.ok) {
            throw new Error("Error");
        }

        const users = await response.json();

        users.forEach(user => {
            const li = document.createElement("li");
            li.textContent = user.name + " (" + user.email + ")";
            list.appendChild(li);
        });

    } catch (error) {
        list.innerHTML = "<li>Помилка завантаження</li>";
    }
}

// запуск
loadUsers();



const form = document.getElementById("postForm");

form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const title = document.getElementById("title").value;
    const body = document.getElementById("body").value;

    const postData = {
        title: title,
        body: body
    };

    try {
        const response = await fetch("https://jsonplaceholder.typicode.com/posts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(postData)
        });

        const data = await response.json();

        console.log("Відповідь сервера:", data);

        form.reset();

    } catch (error) {
        console.log("Помилка відправки");
    }
});
</script>

</body>
</html>
