<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Варіант 2</title>
</head>
<body>

<h2>Варіант 2 — Асинхронна обробка</h2>
<p>Відкрий консоль (F12)</p>

<script>

function getRandomNumber() {
    return new Promise((resolve) => {
        setTimeout(() => {
            const random = Math.floor(Math.random() * 100) + 1;
            resolve(random);
        }, 1000);
    });
}


async function processNumber() {
    try {
        const number = await getRandomNumber();
        console.log("Отримане число:", number);

        if (number < 50) {
            return Promise.resolve(number + 20);
        } else {
            return Promise.reject("Занадто велике число!");
        }

    } catch (error) {
        console.log("Помилка:", error);
        return "Оброблено помилку";
    }
}


processNumber().then(result => {
    console.log("Результат:", result);
});
</script>

</body>
</html>
