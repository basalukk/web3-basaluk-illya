<!DOCTYPE html>

<body>
<h2>Відкрий консоль (F12)</h2>

<script>
const students = {
    ТарасШевченко: { math: 10, physics: 8, english: 9 },
    ОляКузміч: { math: 12, physics: 11, english: 10 },
    ЛюдмилаГолуб: { math: 7, physics: 9, english: 8 }
};

for (let name in students) {
    const grades = Object.values(students[name]);
    const avg = grades.reduce((a, b) => a + b, 0) / grades.length;

    console.log(name + ": середній бал =", avg);
}
</script>
